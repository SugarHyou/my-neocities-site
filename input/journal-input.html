<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gyaru/o Style + Artist 𓆩♡𓆪 Bright Leopard Obsessed">
    <title>SugarHyou ★</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/assets/art/Leopard Heart (Apr 22, 2026).png">
    <style>
        .app-card {
    gap: 10px;
}

label {
    font-size: var(--large-font-size);
    color: var(--dark-berry);
    align-self: flex-start;
}

#tag, input, textarea {
    width: 100%;
    padding: 10px;
    border: var(--small-border) solid var(--hot-pink);
    border-radius: var(--small-radius);
    background: var(--white);
    color: var(--dark-berry);
    font-family: inherit;
    font-size: var(--small-font-size);
}

textarea {
    height: 150px;
    resize: vertical;
}

#submit-btn {
    background: var(--hot-pink);
    color: var(--white);
    border: none;
    padding: 10px 15px;
    border-radius: var(--standard-radius);
    font-family: inherit;
    font-size: var(--standard-font-size);
    cursor: pointer;
    transition: transform 0.2s ease;
}

#submit-btn:hover {
    background: var(--dark-berry);
}
    </style>
</head>

<body>
<button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>
    <div class="grid-container-2">
    <main id="col-center"> 
    <div class="double-box flex">
        <h2 class="tab-title lang-text" data-en="new entry" data-jp="ホーム">new entry</h2>
        <div class="leopard-layer flex column">
            <header></header>
            <div class="inner-box flex column">
                <div class="app-card flex column align-center">

                    <label for="tag">Category</label>
                    <select id="tag">
                        <option value="Personal">📖 Personal</option>
                    </select>

                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Leave blank for quick posts...">

                    <label for="content">What's on your mind?</label>
                    <textarea id="content" placeholder="Type your quick shit here..."></textarea>

                    <button id="submit-btn" onclick="publishPost()">Publish to Feed</button>
                </div>
            </div>
        </div>
    </div>
    </main>
    <nav id="col-right">
      <div id="nav-box" class="double-box flex">
        <h2 class="tab-title lang-text" data-en="Menu" data-jp="メニュー">Menu</h2>
        <div class="leopard-layer flex column">
          <div class="inner-box flex column">
            <div id="nav-links">
              <a href="/index.html" class="lang-text" data-en="🏠 Home" data-jp="🏠 ホーム">🏠 Home</a>
              <a href="/profile.html" class="lang-text" data-en="🎀 Profile" data-jp="🎀 プロフィール">🎀 Profile</a>
              <a href="/art.html" class="lang-text" data-en="🎨 Art" data-jp="🎨 アート">🎨 Art</a>
              <a href="/journal.html" class="lang-text" data-en="📖 Journal" data-jp="📖 日記">📖 Journal</a>
              <a href="https://sugarhyou.atabook.org/" class="lang-text" data-en="💌 Guestbook" data-jp="💌 ゲストブック">💌
                Guestbook</a>
              <a href="/neighbors.html" class="lang-text" data-en="💞 Neighbors" data-jp="💞 リンク集">💞 Neighbors</a>
              <a href="/fanlistings.html" class="lang-text" data-en="🏷️ Fanlistings" data-jp="🏷️ ファンリスティング">🏷️
                Fanlistings</a>
            </div>

            <div class="calendar-container">
              <div class="calendar-header">
                <button id="prevMonth">◀</button>
                <h2 id="monthDisplay"></h2>
                <button id="nextMonth">▶</button>
              </div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <audio id="main-player"></audio>

            <div class="button-row flex">
              <button onclick="changeTrack(-1)" title="Backward">◀◀</button>
              <button id="play-pause-btn" onclick="togglePlay()" title="Play/Pause">▶</button>
              <button onclick="toggleLoop(this)" title="Loop" class="loop-btn">↻</button>
              <button onclick="changeTrack(1)" title="Forward">▶▶</button>
            </div>

            <div class="now-playing-text lang-text" data-en="♪ Select a track..." data-jp="♪ トラックを選択してね...">♪ Select a
              track...</div>

            <div class="lang-menu">
              <button id="lang-toggle" onclick="toggleLanguage()" style="width: 100%;">
                🇯🇵 Switch to JP
              </button>
            </div>

            <div class="settings-menu">
              <select id="theme-select" onchange="changeTheme(this.value)" style="width: 100%;">
                <option value="light">Default</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="tropical">Tropical</option>

            <div class="flex justify-center align-center">

            <div class="flex align-center justify-center" style="gap: 10px;">
              <a href="https://www.instagram.com/sugarhyou/"><img src="/assets/art/Instagram (Apr 26, 2026).png"></a>
              <a href="https://www.tiktok.com/@sugarhyou"><img src="/assets/art/TikTok (Apr 26, 2026).png"></a>
              <a href="https://www.tumblr.com/blog/sugarhyou"><img src="/assets/art/Tumblr (Apr 26, 2026).png"></a>
              <a href="https://www.youtube.com/@SugarHyou"><img src="/assets/art/YouTube (Apr 26, 2026).png"></a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    </div>

    <script>
        const GITHUB_USERNAME = 'SugarHyou';
        const REPO_NAME = 'my-neocities-site';
        const FILE_PATH = 'output/journal.json';

        let GITHUB_TOKEN = localStorage.getItem('my_journal_token');

        if (!GITHUB_TOKEN) {
            GITHUB_TOKEN = prompt("💞 Welcome back! Please insert a dollar to unlock your dashboard:");
            if (GITHUB_TOKEN) {
                localStorage.setItem('my_journal_token', GITHUB_TOKEN.trim());
            } else {
                alert("Dashboard locked. You won't be able to publish without a dollar!");
            }
        }

        async function publishPost() {
            const btn = document.getElementById('submit-btn');
            const tagSelect = document.getElementById('tag');
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (!GITHUB_TOKEN) {
                return alert("No dollar found! Please refresh the page to enter it.");
            }
            if (!content) return alert("You didn't type anything!");

            btn.innerText = "Publishing... 💞";
            btn.disabled = true;

            const now = new Date();
            const dateOptions = { month: 'short', day: 'numeric', year: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
            const formattedDate = `${now.toLocaleDateString('en-US', dateOptions)} - ${now.toLocaleTimeString('en-US', timeOptions)}`;

            const icon = tagSelect.value === 'Personal' ? '💭' : '📖';

            const newPost = {
                date: formattedDate,
                tag: tagSelect.value,
                icon: icon,
                title: title,
                content: content
            };

            try {
                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;

                let res = await fetch(url, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });

                let sha = "";
                let currentPosts = [];

                if (res.status === 200) {
                    const fileData = await res.json();
                    sha = fileData.sha;
                    currentPosts = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, '')))));
                } else if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('my_journal_token');
                    return alert("Invalid Dollar! The app local memory has reset. Please refresh and try entering your dollar again.");
                } else if (res.status !== 404) {
                    return alert(`GitHub Read Error Status: ${res.status}`);
                }

                currentPosts.unshift(newPost);

                let updateRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `📱 Posted a new ${newPost.tag} from phone`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentPosts, null, 2)))),
                        sha: sha
                    })
                });

                if (updateRes.status === 200 || updateRes.status === 201) {
                    alert("Posted successfully! 🎀");
                    document.getElementById('title').value = '';
                    document.getElementById('content').value = '';
                } else {
                    const errData = await updateRes.json();
                    alert(`GitHub Write Error: ${errData.message}`);
                }
            } catch (error) {
                console.error(error);
                alert(`App Error: ${error.message}`);
            } finally {
                btn.innerText = "Publish to Feed";
                btn.disabled = false;
            }
        }
    </script>
    <script src="/script.js"></script>
</body>

</html>
